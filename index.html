<!DOCTYPE html>
<html lang="ru">
<head>

    <link rel="stylesheet" href="style.css">

<body>

        <nav class="nav">

        <div id="posts-container" class="posts-grid">
        </div>
        <div id="loading" class="loading">Загрузка...</div>

    <footer class="footer">
