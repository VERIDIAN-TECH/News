<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERIDIAN NEWS</title>
    <!-- Подключаем шрифты, похожие на стиль Sea Shepherd -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Шапка в морском стиле -->
    <header class="main-header">
        <div class="header-container">
            <div class="brand">
                <div class="logo-text">
                    <span class="v-green">V</span>ERIDIAN <span class="n-red">NEWS</span>
                </div>
                <p class="tagline">Защита цифрового океана</p>
            </div>
            <nav class="main-nav">
                <a href="#" class="nav-item active">Новости</a>
                <a href="#" class="nav-item">Кампании</a>
                <a href="#" class="nav-item">О нас</a>
                <a href="#" class="nav-btn">Поддержать</a>
            </nav>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="content-wrapper">
        <div class="container">
            <!-- Блок для вывода постов -->
            <section id="news-feed" class="news-grid">
                <!-- Посты будут здесь -->
            </section>
            
            <!-- Индикатор загрузки / ошибки -->
            <div id="status-message" class="status-msg">Загрузка новостей...</div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container footer-content">
            <p>&copy; 2026 VERIDIAN NEWS. Все права защищены.</p>
            <div class="footer-links">
                <a href="#">Политика конфиденциальности</a>
                <a href="#">Контакты</a>
            </div>
        </div>
    </footer>

    <!-- Сначала данные, потом логика -->
    <script src="posts.js"></script>
    <script src="script.js"></script>
</body>
</html>
